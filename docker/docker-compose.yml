services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:  
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka_cdc
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
  
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  mysql: 
    image: mysql:8.0
    container_name: mysql_cdc
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=inventory
    command: --server-id=1 --log-bin=mysql-bin --binlog-format=row --default-authentication-plugin=mysql_native_password

  debezium:
    image: debezium/connect:2.1
    container_name: debezium_cdc
    ports:
      - "8083:8083"
    depends_on:
      - kafka
      - mysql
    environment:
      - BOOTSTRAP_SERVERS=kafka:29092 
      - GROUP_ID=1
      - CONFIG_STORAGE_TOPIC=my_connect_configs
      - OFFSET_STORAGE_TOPIC=my_connect_offsets
      - STATUS_STORAGE_TOPIC=my_connect_statuses
      - KEY_CONVERTER=org.apache.kafka.connect.json.JsonConverter
      - VALUE_CONVERTER=org.apache.kafka.connect.json.JsonConverter

  setup-connector:
      image: curlimages/curl:latest
      container_name: setup_cdc
      depends_on:
        - debezium
      volumes:
        - ../src/cdc/debezium_connector.json:/configs/debezium_connector.json
        - ../scripts/setup_debezium.sh:/setup.sh
      entrypoint: ["/bin/sh", "/setup.sh"]
      network_mode: "host" # Để curl vào localhost:8083 dễ dàng

  # Clickhouse
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: clickhouse_cdc
    ports:
      - "8123:8123"  # HTTP Interface (for Spark JDBC)
      - "9000:9000"  # Native Client Interface
      - "9440:9440"  # Secure Native Interface
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=1111
      - CLICKHOUSE_DB=inventory_dwh
    volumes:
      - ./clickhouse_data:/var/lib/clickhouse  # Persistence
      - ../scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql # Auto-run your schema
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5